name: Test & Coverage
on:
  push:
    branches: [chore/setup-jest-coverage]
  pull_request:
    branches: [chore/setup-jest-coverage]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← add this
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0     # ← add this

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:badges

      - name: Commit badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git commit -m "chore: update coverage badges" || echo "No changes"
          git push